<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Royal Progressive Food | Wholesale Supply</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at 20% 30%, #0a0a0a 0%, #000000 100%);
      min-height: 100vh;
      padding: 32px 20px;
      color: #e5d9b5;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    /* Royal Gold & Black Theme */
    .brand {
      margin-bottom: 28px;
      text-align: left;
      border-left: 4px solid #D4AF37;
      padding-left: 18px;
    }

    .brand h1 {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #F9E076 0%, #D4AF37 70%, #B8860B 100%);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      text-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
    }

    .brand p {
      font-size: 0.95rem;
      color: #D4AF37;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    /* Cards - Black Velvet + Gold Trim */
    .card {
      background: #0f0f0f;
      border-radius: 28px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(212, 175, 55, 0.2);
      transition: all 0.25s ease;
      backdrop-filter: blur(1px);
    }

    .card:hover {
      box-shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.7), 0 0 0 1px #D4AF37;
      transform: translateY(-2px);
    }

    /* Input Groups - Royal */
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-group label {
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #D4AF37;
    }

    .input-group input, .input-group textarea {
      padding: 14px 18px;
      border: 1.5px solid #2a2a2a;
      border-radius: 20px;
      font-size: 0.95rem;
      transition: all 0.2s;
      background: #1a1a1a;
      font-family: inherit;
      color: #f5e7c8;
    }

    .input-group input:focus, .input-group textarea:focus {
      outline: none;
      border-color: #D4AF37;
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.25);
      background: #0f0f0f;
    }

    .input-group input::placeholder, .input-group textarea::placeholder {
      color: #6a5c3c;
    }

    /* Products */
    .products-grid {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .product-item {
      background: #0c0c0c;
      border-radius: 24px;
      padding: 18px;
      transition: all 0.2s;
      border: 1px solid #2a2418;
    }

    .product-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .product-info {
      display: flex;
      align-items: center;
      gap: 14px;
      flex: 2;
      min-width: 170px;
    }

    .product-icon {
      font-size: 2.3rem;
      background: #000000;
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 28px;
      border: 1px solid #D4AF37;
      box-shadow: 0 0 6px rgba(212, 175, 55, 0.5);
    }

    .product-details h3 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #F5E2A0;
    }

    .product-details p {
      font-size: 0.72rem;
      color: #b49b4c;
      margin-top: 4px;
    }

    .price-tag {
      text-align: right;
      min-width: 110px;
    }

    .price-amount {
      font-weight: 800;
      font-size: 1.5rem;
      color: #D4AF37;
    }

    .price-unit {
      font-size: 0.7rem;
      color: #ab8e3a;
    }

    .quantity-control {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #111111;
      padding: 4px 8px;
      border-radius: 48px;
      border: 1px solid #D4AF37;
    }

    .qty-btn {
      width: 38px;
      height: 38px;
      border-radius: 40px;
      border: none;
      background: #1e1b12;
      font-size: 1.3rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      color: #D4AF37;
    }

    .qty-btn:hover {
      background: #D4AF37;
      color: #000000;
      transform: scale(0.94);
      box-shadow: 0 0 8px gold;
    }

    .qty-input {
      width: 70px;
      text-align: center;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      background: #0a0a0a;
      color: #f3e2b0;
      font-family: monospace;
      padding: 8px 0;
    }

    .qty-input:focus {
      outline: none;
      border-bottom: 2px solid #D4AF37;
    }

    /* Summary Card */
    .summary-card {
      background: #0a0702;
      border-left: 5px solid #D4AF37;
    }

    .summary-title {
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #EBC45A;
    }

    .order-items-list {
      background: #050505;
      border-radius: 20px;
      padding: 14px;
      margin: 12px 0;
      border: 1px solid #2f2818;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px dashed #2b2418;
      font-size: 0.9rem;
      color: #e6d5a8;
    }

    .summary-row:last-child {
      border-bottom: none;
    }

    .empty-summary {
      color: #8f7a46;
      text-align: center;
      padding: 14px;
      font-style: italic;
    }

    /* Total Bar - Regal */
    .total-bar {
      background: #000000;
      border-radius: 32px;
      padding: 20px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      border: 1px solid #D4AF37;
      box-shadow: 0 0 12px rgba(212, 175, 55, 0.3);
      margin-bottom: 20px;
    }

    .total-amount-large {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #F6E58D;
    }

    .total-meta {
      text-align: right;
      font-size: 0.8rem;
      color: #D4AF37;
    }

    /* Buttons - Gold & Black */
    .whatsapp-btn {
      width: 100%;
      background: linear-gradient(95deg, #D4AF37 0%, #B8860B 100%);
      border: none;
      padding: 16px;
      font-size: 1.1rem;
      font-weight: 800;
      border-radius: 48px;
      color: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
      margin-bottom: 16px;
      letter-spacing: 0.5px;
    }

    .whatsapp-btn:hover {
      background: linear-gradient(95deg, #E5C158 0%, #D4AF37 100%);
      transform: scale(0.99);
      box-shadow: 0 8px 20px rgba(212, 175, 55, 0.6);
      color: #000000;
    }

    .reset-btn {
      background: transparent;
      border: 1.5px solid #D4AF37;
      color: #D4AF37;
      padding: 12px;
      border-radius: 40px;
      width: 100%;
      font-weight: 700;
      transition: 0.2s;
      cursor: pointer;
      margin-bottom: 16px;
      font-size: 0.9rem;
    }

    .reset-btn:hover {
      background: #D4AF37;
      color: #000000;
      border-color: #FFDF7E;
    }

    .info-note {
      background: #0f0d07;
      border-radius: 22px;
      padding: 14px 20px;
      font-size: 0.8rem;
      color: #d6bc6b;
      text-align: center;
      border: 1px solid #3a2e1a;
    }

    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button {
      opacity: 0.5;
      filter: invert(1);
    }

    @media (max-width: 580px) {
      .product-row {
        flex-direction: column;
        align-items: stretch;
      }
      .price-tag {
        text-align: left;
      }
      .quantity-control {
        justify-content: space-between;
      }
      .total-bar {
        flex-direction: column;
        align-items: flex-start;
      }
      .total-meta {
        text-align: left;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="brand">
    <h1>👑 Progressive Food</h1>
    <p>Royal wholesale — premium supply for hotels & elite restaurants</p>
  </div>

  <!-- Business & notes (golden elegance) -->
  <div class="card">
    <div class="input-group" style="margin-bottom: 18px;">
      <label>🏨 ESTABLISHMENT NAME *</label>
      <input type="text" id="businessName" placeholder="e.g., Royal Palm Hotel, The Golden Spoon" autocomplete="off">
    </div>
    <div class="input-group">
      <label>📜 DELIVERY DIRECTIVES / NOTES</label>
      <textarea id="deliveryNotes" rows="2" placeholder="Address, landmark, preferred time, royal instructions..."></textarea>
    </div>
  </div>

  <!-- Products container (Eggs + Chicken, quantity based) -->
  <div id="productsContainer"></div>

  <!-- Order summary - gilded -->
  <div class="card summary-card" id="summaryCard">
    <div class="summary-title">
      ✦ ORDER EPITOME ✦
    </div>
    <div id="dynamicSummary" class="order-items-list">
      <div class="empty-summary">👑 No regal items selected yet</div>
    </div>
  </div>

  <!-- Total area with royal flair -->
  <div class="total-bar">
    <div>
      <div style="font-size:0.75rem; letter-spacing:2px; color:#D4AF37;">TOTAL AMOUNT</div>
      <div class="total-amount-large">₦<span id="totalAmount">0</span></div>
    </div>
    <div class="total-meta" id="totalMeta">
      <span id="itemCountText">0 items</span>
    </div>
  </div>

  <button class="whatsapp-btn" id="submitBtn">
    📲 PLACE ROYAL ORDER (WHATSAPP)
  </button>
  <button class="reset-btn" id="resetCartBtn">
    ♻️ RESET CART & CLEAR
  </button>
  <div class="info-note">
    💠 Your order will be sent directly to our royal wholesale desk. We'll confirm stock, pricing & dispatch.
  </div>
</div>

<script>
  // ----- PRODUCT CATALOG (Eggs + Quantity-based Chicken, removed Tilapia) -----
  const PRODUCTS = [
    {
      id: 'eggs',
      name: 'Fresh Premium Eggs',
      unit: 'crate',
      price: 6500,
      icon: '🥚',
      description: 'Farm-fresh, jumbo size',
      step: 1,
      decimalPlaces: 0,
      isWholeNumber: true
    },
    {
      id: 'chicken',
      name: 'Royal Cleaned Chicken',
      unit: 'whole chicken',
      price: 4500,
      icon: '🍗',
      description: 'Fully dressed, quantity-based (per whole)',
      step: 1,
      decimalPlaces: 0,
      isWholeNumber: true
    }
  ];

  // ----- state management -----
  let quantities = {};
  let hotelName = '';
  let deliveryNotes = '';

  // localStorage helpers
  function loadLocalStorage() {
    const savedQuantities = localStorage.getItem('progressive_quantities');
    if (savedQuantities) {
      try {
        const parsed = JSON.parse(savedQuantities);
        PRODUCTS.forEach(p => {
          if (typeof parsed[p.id] === 'number' && !isNaN(parsed[p.id])) {
            quantities[p.id] = parsed[p.id];
          } else {
            quantities[p.id] = 0;
          }
        });
      } catch(e) { initQuantities(); }
    } else {
      initQuantities();
    }

    const savedBusiness = localStorage.getItem('progressive_business');
    if (savedBusiness) document.getElementById('businessName').value = savedBusiness;
    const savedNotes = localStorage.getItem('progressive_notes');
    if (savedNotes) document.getElementById('deliveryNotes').value = savedNotes;

    hotelName = document.getElementById('businessName').value;
    deliveryNotes = document.getElementById('deliveryNotes').value;
  }

  function initQuantities() {
    PRODUCTS.forEach(p => { quantities[p.id] = 0; });
  }

  function persistState() {
    localStorage.setItem('progressive_quantities', JSON.stringify(quantities));
    localStorage.setItem('progressive_business', hotelName);
    localStorage.setItem('progressive_notes', deliveryNotes);
  }

  // format quantity (always integer now)
  function formatQuantity(value) {
    return Math.floor(value);
  }

  // render products with integer step for chicken (no decimals)
  function renderProducts() {
    const container = document.getElementById('productsContainer');
    if (!container) return;
    container.innerHTML = '<div class="products-grid"></div>';
    const grid = container.querySelector('.products-grid');

    PRODUCTS.forEach(product => {
      const currentVal = quantities[product.id] !== undefined ? quantities[product.id] : 0;
      const displayValue = formatQuantity(currentVal);
      const productDiv = document.createElement('div');
      productDiv.className = 'product-item';
      productDiv.innerHTML = `
        <div class="product-row">
          <div class="product-info">
            <div class="product-icon">${product.icon}</div>
            <div class="product-details">
              <h3>${product.name}</h3>
              <p>${product.description}</p>
            </div>
          </div>
          <div class="price-tag">
            <div class="price-amount">₦${product.price.toLocaleString()}</div>
            <div class="price-unit">per ${product.unit}</div>
          </div>
          <div class="quantity-control">
            <button class="qty-btn" data-id="${product.id}" data-dir="minus">−</button>
            <input type="number" class="qty-input" data-id="${product.id}" value="${displayValue}" step="1" min="0">
            <button class="qty-btn" data-id="${product.id}" data-dir="plus">+</button>
          </div>
        </div>
      `;
      grid.appendChild(productDiv);
    });

    // attach fresh listeners
    document.querySelectorAll('.qty-btn').forEach(btn => {
      btn.removeEventListener('click', handleBtnClick);
      btn.addEventListener('click', handleBtnClick);
    });
    document.querySelectorAll('.qty-input').forEach(inp => {
      inp.removeEventListener('change', handleInputChange);
      inp.addEventListener('change', handleInputChange);
    });
  }

  function handleBtnClick(e) {
    const btn = e.currentTarget;
    const productId = btn.dataset.id;
    const direction = btn.dataset.dir;
    const product = PRODUCTS.find(p => p.id === productId);
    if (!product) return;

    let current = quantities[productId] ?? 0;
    if (direction === 'plus') {
      current += 1;
    } else {
      current = Math.max(0, current - 1);
    }
    // ensure integer for both eggs and chicken
    current = Math.floor(current);
    quantities[productId] = current;
    updateAllUI();
  }

  function handleInputChange(e) {
    const input = e.currentTarget;
    const productId = input.dataset.id;
    const product = PRODUCTS.find(p => p.id === productId);
    if (!product) return;
    let rawValue = parseFloat(input.value);
    if (isNaN(rawValue)) rawValue = 0;
    rawValue = Math.max(0, Math.floor(rawValue));   // force integer (quantity)
    quantities[productId] = rawValue;
    updateAllUI();
  }

  // compute total
  function calculateTotal() {
    let total = 0;
    PRODUCTS.forEach(p => {
      const qty = quantities[p.id] ?? 0;
      total += qty * p.price;
    });
    return total;
  }

  // items with positive quantity
  function getActiveItems() {
    return PRODUCTS.filter(p => (quantities[p.id] ?? 0) > 0);
  }

  // update summary & meta (royal style)
  function updateSummaryAndMeta() {
    const activeItems = getActiveItems();
    const summaryContainer = document.getElementById('dynamicSummary');
    const totalMetaSpan = document.getElementById('itemCountText');

    if (!summaryContainer) return;

    if (activeItems.length === 0) {
      summaryContainer.innerHTML = '<div class="empty-summary">✨ No items selected — add from above</div>';
      if (totalMetaSpan) totalMetaSpan.innerText = '0 items';
      return;
    }

    let itemsHtml = '';
    let totalUnitCount = 0;
    activeItems.forEach(item => {
      const qty = quantities[item.id];
      totalUnitCount += qty;
      const subtotal = qty * item.price;
      itemsHtml += `
        <div class="summary-row">
          <span><span style="font-weight:700;">${item.icon}</span> ${item.name} (${qty} ${item.unit}${qty !== 1 ? 's' : ''})</span>
          <span>₦${subtotal.toLocaleString()}</span>
        </div>
      `;
    });
    summaryContainer.innerHTML = itemsHtml;
    if (totalMetaSpan) {
      totalMetaSpan.innerText = `${totalUnitCount} pcs · ${activeItems.length} item${activeItems.length !== 1 ? 's' : ''}`;
    }
  }

  // sync all UI inputs, total, summary, persist
  function updateAllUI() {
    // update input fields
    PRODUCTS.forEach(product => {
      const inputField = document.querySelector(`.qty-input[data-id="${product.id}"]`);
      if (inputField) {
        const val = quantities[product.id] ?? 0;
        inputField.value = Math.floor(val);
      }
    });

    const total = calculateTotal();
    document.getElementById('totalAmount').innerText = total.toLocaleString();
    updateSummaryAndMeta();
    persistState();
  }

  // build royal WhatsApp order
  function buildWhatsAppMessage() {
    const business = document.getElementById('businessName').value.trim();
    const notes = document.getElementById('deliveryNotes').value.trim();

    if (!business) {
      alert('👑 Please enter your establishment name (hotel/restaurant) to proceed');
      return null;
    }

    const active = getActiveItems();
    if (active.length === 0) {
      alert('🛒 Your royal cart is empty — please add items before ordering.');
      return null;
    }

    let itemsList = '';
    active.forEach(item => {
      const qty = quantities[item.id];
      const subtotal = qty * item.price;
      itemsList += `▸ ${item.icon} ${item.name}: ${qty} ${item.unit}${qty !== 1 ? 's' : ''}  —  ₦${subtotal.toLocaleString()}\n`;
    });

    const totalSum = calculateTotal();
    const deliveryText = notes ? `📍 *Delivery notes:* ${notes}\n` : '';

    const message = `*👑 PROGRESSIVE FOOD - ROYAL WHOLESALE ORDER*\n\n🏨 *Establishment:* ${business}\n${deliveryText}━━━━━━━━━━━━━━━━━━━━\n*ORDER DETAILS (Quantity based)*\n${itemsList}\n━━━━━━━━━━━━━━━━━━━━\n*💰 TOTAL AMOUNT:* ₦${totalSum.toLocaleString()}\n\n📦 Kindly confirm availability & dispatch schedule. Long live the kitchen!`;

    return message;
  }

  // send WhatsApp
  function sendRoyalOrder() {
    const msg = buildWhatsAppMessage();
    if (!msg) return;
    const phone = '2348034132687';  // wholesale line
    const encoded = encodeURIComponent(msg);
    const waUrl = `https://wa.me/${phone}?text=${encoded}`;
    window.open(waUrl, '_blank');

    const btn = document.getElementById('submitBtn');
    const originalHTML = btn.innerHTML;
    btn.innerHTML = '✓ ORDER RELAYED · OPENING WHATSAPP';
    btn.style.background = '#B8860B';
    setTimeout(() => {
      btn.innerHTML = originalHTML;
      btn.style.background = 'linear-gradient(95deg, #D4AF37 0%, #B8860B 100%)';
    }, 2100);
  }

  // full reset
  function resetRoyalCart() {
    if (confirm('Clear all items, business name and delivery notes? (this action is final)')) {
      initQuantities();
      document.getElementById('businessName').value = '';
      document.getElementById('deliveryNotes').value = '';
      hotelName = '';
      deliveryNotes = '';
      updateAllUI();
      localStorage.removeItem('progressive_quantities');
      localStorage.removeItem('progressive_business');
      localStorage.removeItem('progressive_notes');
      persistState();
      // force re-render inputs
      PRODUCTS.forEach(p => { quantities[p.id] = 0; });
      updateAllUI();
      const inputs = document.querySelectorAll('.qty-input');
      inputs.forEach(inp => {
        const pid = inp.dataset.id;
        if (pid) inp.value = '0';
      });
    }
  }

  // sync business & notes on live changes
  function bindFormSync() {
    const businessInput = document.getElementById('businessName');
    const notesInput = document.getElementById('deliveryNotes');

    businessInput.addEventListener('input', (e) => {
      hotelName = e.target.value;
      persistState();
    });
    notesInput.addEventListener('input', (e) => {
      deliveryNotes = e.target.value;
      persistState();
    });
  }

  // initialization
  function init() {
    loadLocalStorage();
    renderProducts();
    updateAllUI();
    bindFormSync();

    document.getElementById('submitBtn').addEventListener('click', sendRoyalOrder);
    document.getElementById('resetCartBtn').addEventListener('click', resetRoyalCart);
  }

  init();
</script>
</body>
</html>
